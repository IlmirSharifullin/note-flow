kafka_namespace: kafka
kafka_cluster_name: noteflow-kafka

strimzi_install_url: "https://strimzi.io/install/latest?namespace={{ kafka_namespace }}"
strimzi_operator_deployment: strimzi-cluster-operator

kafka_controller_replicas: 1
kafka_broker_replicas: 1

kafka_controller_storage_size: 2Gi
kafka_broker_storage_size: 5Gi

kafka_controller_cpu_request: 250m
kafka_controller_memory_request: 512Mi
kafka_controller_cpu_limit: "1"
kafka_controller_memory_limit: 1Gi

kafka_broker_cpu_request: 500m
kafka_broker_memory_request: 1Gi
kafka_broker_cpu_limit: "2"
kafka_broker_memory_limit: 2Gi

kafka_topic_partitions: 3
kafka_topic_replicas: 1
kafka_wait_retries: 60
kafka_wait_delay: 10
