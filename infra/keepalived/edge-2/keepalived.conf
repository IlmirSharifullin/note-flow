vrrp_script chk_haproxy {
  script "pidof haproxy"
  interval 2
  fall 2
  rise 2
}

vrrp_instance NOTEFLOW_EDGE {
  state BACKUP
  interface eth0
  virtual_router_id 51
  priority 100
  advert_int 1

  authentication {
    auth_type PASS
    auth_pass noteflow
  }

  virtual_ipaddress {
    192.168.10.100/24
  }

  track_script {
    chk_haproxy
  }
}
