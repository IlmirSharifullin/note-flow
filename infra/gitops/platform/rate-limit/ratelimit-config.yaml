apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config
  namespace: rate-limit
data:
  config.yaml: |
    domain: noteflow
    descriptors:
      - key: generic_key
        value: global
        rate_limit:
          unit: minute
          requests_per_unit: 100
      - key: path
        value: /auth/login
        rate_limit:
          unit: minute
          requests_per_unit: 5
      - key: path
        value: /auth/register
        rate_limit:
          unit: hour
          requests_per_unit: 10
      - key: path
        value: /files
        rate_limit:
          unit: minute
          requests_per_unit: 30
