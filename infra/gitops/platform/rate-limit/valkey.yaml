apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: rate-limit
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: rate-limit
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: ingress
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: redis
      port: 6379
      targetPort: redis
