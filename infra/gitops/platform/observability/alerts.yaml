apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: noteflow-platform-alerts
  namespace: observability
  labels:
    release: observability
spec:
  groups:
    - name: noteflow.platform
      rules:
        - alert: KubernetesPodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod is restarting often"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in 10 minutes."
        - alert: KubernetesPodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for more than 10 minutes."
        - alert: HighNodeMemoryUsage
          expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High node memory usage"
            description: "Node {{ $labels.instance }} memory usage is above 85%."
        - alert: IstioHigh5xxRate
          expr: |
            (
              sum(rate(istio_requests_total{response_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(istio_requests_total[5m])), 1)
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx rate in Istio"
            description: "More than 5% of Istio requests are failing with 5xx."
        - alert: RateLimitServiceDown
          expr: up{namespace="rate-limit", service="ratelimit"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Rate Limit Service is down"
            description: "Envoy Rate Limit Service is not scrapeable by Prometheus."
