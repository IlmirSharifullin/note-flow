apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-registry
  namespace: registry
  labels:
    app.kubernetes.io/name: local-registry
    app.kubernetes.io/part-of: noteflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: local-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-registry
        app.kubernetes.io/part-of: noteflow
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: local-registry
  namespace: registry
  labels:
    app.kubernetes.io/name: local-registry
    app.kubernetes.io/part-of: noteflow
spec:
  type: NodePort
  clusterIP: 10.98.190.7
  selector:
    app.kubernetes.io/name: local-registry
  ports:
    - name: http
      port: 5000
      targetPort: http
      nodePort: 30500
