apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-haproxy
  namespace: edge
  labels:
    app.kubernetes.io/name: edge-haproxy
    app.kubernetes.io/part-of: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-haproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-haproxy
    spec:
      containers:
        - name: haproxy
          image: haproxy:2.9-alpine
          args:
            - -f
            - /usr/local/etc/haproxy/haproxy.cfg
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/haproxy
      volumes:
        - name: config
          configMap:
            name: edge-haproxy-config
