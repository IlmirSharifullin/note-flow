apiVersion: v1
kind: Service
metadata:
  name: edge-haproxy
  namespace: edge
  labels:
    app.kubernetes.io/name: edge-haproxy
    app.kubernetes.io/part-of: ingress
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: edge-haproxy
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
