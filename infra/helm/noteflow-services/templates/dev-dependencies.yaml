      app.kubernetes.io/name: postgres-files
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: postgres-files
        app.kubernetes.io/part-of: noteflow
    spec:
      containers:
        - name: postgres
          image: {{ .Values.devDependencies.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.devDependencies.postgres.filesDatabase | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: noteflow-dev-dependencies-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noteflow-dev-dependencies-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
