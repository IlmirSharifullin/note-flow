{{- if .Values.devDependencies.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: noteflow-dev-dependencies-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noteflow-services.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.devDependencies.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.devDependencies.postgres.password | quote }}
  MINIO_ROOT_USER: {{ .Values.devDependencies.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.devDependencies.minio.rootPassword | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-users
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noteflow-services.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-users
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: postgres-users
        app.kubernetes.io/part-of: noteflow
    spec:
      containers:
        - name: postgres
          image: {{ .Values.devDependencies.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.devDependencies.postgres.usersDatabase | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: noteflow-dev-dependencies-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noteflow-dev-dependencies-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.devDependencies.postgres.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noteflow-services.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-users
spec:
  selector:
    app.kubernetes.io/name: postgres-users
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-files
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noteflow-services.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-files
spec:
